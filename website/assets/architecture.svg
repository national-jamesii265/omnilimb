<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="a2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#36e0c0"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b8cff"/>
    </marker>
  </defs>
  <rect width="1200" height="440" rx="18" fill="#0c0e14"/>
  <rect x="0.5" y="0.5" width="1199" height="439" rx="18" fill="none" stroke="#27304a"/>

  <text x="40" y="48" fill="#e8ecf6" font-size="22" font-weight="700">How Omnilimb fits</text>
  <text x="40" y="74" fill="#9aa4be" font-size="14">Hermes is the brain. Omnilimb is the deterministic hands &amp; feet — it never calls a model on the execution path.</text>

  <!-- Brain -->
  <g transform="translate(40,120)">
    <rect width="220" height="120" rx="14" fill="#141824" stroke="url(#a2)" stroke-width="2"/>
    <text x="110" y="40" text-anchor="middle" fill="#e8ecf6" font-size="18" font-weight="700">Hermes</text>
    <text x="110" y="66" text-anchor="middle" fill="#9aa4be" font-size="12">the brain</text>
    <text x="110" y="90" text-anchor="middle" fill="#9aa4be" font-size="12">LLM · conversation</text>
    <text x="110" y="108" text-anchor="middle" fill="#9aa4be" font-size="12">memory · UI</text>
  </g>

  <!-- arrow 1 -->
  <line x1="262" y1="180" x2="330" y2="180" stroke="#5b8cff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="296" y="168" text-anchor="middle" fill="#36e0c0" font-size="11">tool call</text>
  <text x="296" y="200" text-anchor="middle" fill="#9aa4be" font-size="10">structured JSON</text>

  <!-- Omnilimb -->
  <g transform="translate(340,108)">
    <rect width="260" height="224" rx="14" fill="#1b2030" stroke="#5b8cff" stroke-width="2"/>
    <text x="130" y="36" text-anchor="middle" fill="#e8ecf6" font-size="18" font-weight="700">Omnilimb</text>
    <text x="130" y="58" text-anchor="middle" fill="#9aa4be" font-size="12">deterministic execution · no LLM</text>
    <g transform="translate(20,78)">
      <rect width="220" height="36" rx="9" fill="#141824" stroke="#27304a"/>
      <text x="110" y="23" text-anchor="middle" fill="#e8ecf6" font-size="13">retry · rollback · audit</text>
    </g>
    <g transform="translate(20,124)">
      <rect width="105" height="74" rx="9" fill="#0e1f1b" stroke="#2c4a44"/>
      <text x="52" y="30" text-anchor="middle" fill="#36e0c0" font-size="13" font-weight="700">cli</text>
      <text x="52" y="50" text-anchor="middle" fill="#9aa4be" font-size="10">openclaw /</text>
      <text x="52" y="64" text-anchor="middle" fill="#9aa4be" font-size="10">clawhub bridge</text>
    </g>
    <g transform="translate(135,124)">
      <rect width="105" height="74" rx="9" fill="#0e1f1b" stroke="#2c4a44"/>
      <text x="52" y="30" text-anchor="middle" fill="#36e0c0" font-size="13" font-weight="700">native</text>
      <text x="52" y="50" text-anchor="middle" fill="#9aa4be" font-size="10">pure Python</text>
      <text x="52" y="64" text-anchor="middle" fill="#9aa4be" font-size="10">no Node</text>
    </g>
  </g>

  <!-- arrow 2 -->
  <line x1="602" y1="220" x2="670" y2="220" stroke="#5b8cff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Targets -->
  <g transform="translate(680,108)">
    <text x="0" y="-2" fill="#9aa4be" font-size="12">executes against</text>
    <g transform="translate(0,8)">
      <rect width="220" height="46" rx="9" fill="#141824" stroke="#27304a"/>
      <text x="16" y="29" fill="#e8ecf6" font-size="13">🔎  Skill registries (multi-market)</text>
    </g>
    <g transform="translate(0,62)">
      <rect width="220" height="46" rx="9" fill="#141824" stroke="#27304a"/>
      <text x="16" y="29" fill="#e8ecf6" font-size="13">📦  Docker sandbox (net off)</text>
    </g>
    <g transform="translate(0,116)">
      <rect width="220" height="46" rx="9" fill="#141824" stroke="#27304a"/>
      <text x="16" y="29" fill="#e8ecf6" font-size="13">🌐  Playwright browser</text>
    </g>
    <g transform="translate(0,170)">
      <rect width="220" height="46" rx="9" fill="#141824" stroke="#27304a"/>
      <text x="16" y="29" fill="#e8ecf6" font-size="13">🧩  python / node / bash / go</text>
    </g>
  </g>

  <!-- return arrow -->
  <path d="M900 360 C 900 410, 150 410, 150 246" fill="none" stroke="#27304a" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arr)"/>
  <text x="525" y="404" text-anchor="middle" fill="#9aa4be" font-size="12">structured JSON result returned to the agent — zero extra inference</text>
</svg>
